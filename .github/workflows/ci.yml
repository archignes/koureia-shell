name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  require-issue-id:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title for Linear issue ID
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          if ! echo "$TITLE" | grep -qE '(DEV|GOV|OUT|UX)-[0-9]+'; then
            echo "::error::PR title must include a Linear issue ID (e.g., DEV-1234)"
            echo ""
            echo "  Title: $TITLE"
            echo "  Fix: update the PR title to include the issue ID"
            echo "  Example: feat(scope): description (DEV-1234)"
            exit 1
          fi

  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure GitHub Packages auth
        run: echo '//npm.pkg.github.com/:_authToken=${{ secrets.GH_PACKAGE_TOKEN }}' >> .npmrc

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test
